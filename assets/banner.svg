<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 240" width="880" height="240" role="img" aria-label="Danya — full-stack and ML engineer">
  <style>
    text { font-family: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
    .fig   { fill: #ff3d00; font-size: 12px; letter-spacing: 3px; }
    .cap   { fill: #8c8c88; font-size: 12px; letter-spacing: 2px; }
    .dim   { fill: #5a5a57; font-size: 11px; letter-spacing: 2px; }
    .hero  { fill: #f4f4f0; font-size: 80px; font-weight: 800; letter-spacing: -3px; }
    .meas  { fill: #ff3d00; font-size: 12px; letter-spacing: 3.5px; }
    .sub   { fill: #8c8c88; font-size: 12.5px; letter-spacing: 0.5px; }
  </style>

  <!-- canvas -->
  <rect x="0" y="0" width="880" height="240" fill="#0e0e0e"/>
  <defs>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="0.8" fill="#222220"/>
    </pattern>
  </defs>
  <rect x="1" y="1" width="878" height="238" fill="url(#dots)"/>
  <rect x="0.5" y="0.5" width="879" height="239" fill="none" stroke="#2a2a2a" stroke-width="1"/>

  <!-- corner registration marks -->
  <path d="M 20 36 V 20 H 36" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <path d="M 844 20 H 860 V 36" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <path d="M 860 204 V 220 H 844" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <path d="M 36 220 H 20 V 204" fill="none" stroke="#3a3a3a" stroke-width="1"/>

  <!-- drawing header -->
  <text x="48" y="48" class="fig">FIG. 01</text>
  <text x="128" y="48" class="cap">— ENGINEER · SELF-HOSTED</text>
  <text x="832" y="48" class="dim" text-anchor="end">REV 2026-07</text>

  <!-- hero -->
  <text x="440" y="134" class="hero" text-anchor="middle">DANYA</text>

  <!-- dimension line -->
  <line x1="208" y1="163" x2="263" y2="163" stroke="#3a3a3a" stroke-width="1"/>
  <line x1="208" y1="157" x2="208" y2="169" stroke="#3a3a3a" stroke-width="1"/>
  <text x="440" y="167" class="meas" text-anchor="middle">FULL-STACK · ML · AI-NATIVE</text>
  <line x1="617" y1="163" x2="672" y2="163" stroke="#3a3a3a" stroke-width="1"/>
  <line x1="672" y1="157" x2="672" y2="169" stroke="#3a3a3a" stroke-width="1"/>

  <text x="440" y="193" class="sub" text-anchor="middle">production systems end-to-end — LLM agents · MCP · local models</text>

  <!-- drawing footer -->
  <text x="48" y="224" class="dim">SCALE 1:1</text>
  <text x="440" y="224" class="dim" text-anchor="middle">PYTHON · TYPESCRIPT · GO · RUST · POSTGRES · DOCKER</text>
  <text x="832" y="224" class="dim" text-anchor="end">SHEET 880 × 240</text>
</svg>
